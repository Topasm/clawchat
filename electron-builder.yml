appId: com.clawchat.app
productName: ClawChat
directories:
  buildResources: build
  output: release
files:
  - dist-electron
  - dist
extraResources:
  - from: "server"
    to: "server"
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!venv/**"
      - "!data/**"
      - "!*.log"
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.productivity
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - AppImage
publish:
  - provider: github
    owner: Topasm
    repo: clawchat
