name: Build Electron

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build server binary
        run: |
          cd server
          pip install -r requirements.txt pyinstaller
          pyinstaller run_server.py \
            --name clawchat-server \
            --onedir \
            --noconfirm \
            --hidden-import aiosqlite \
            --hidden-import sqlalchemy.dialects.sqlite \
            --collect-submodules uvicorn \
            --collect-submodules jose \
            --paths .
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:electron
      - name: Build Electron package
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ClawChat-linux
          path: release/*.AppImage
      - name: Attach to Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 'Nightly Build'
          prerelease: true
          files: release/*.AppImage

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build server binary
        run: |
          cd server
          pip install -r requirements.txt pyinstaller
          pyinstaller run_server.py --name clawchat-server --onedir --noconfirm --hidden-import aiosqlite --hidden-import sqlalchemy.dialects.sqlite --collect-submodules uvicorn --collect-submodules jose --paths .
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:electron
      - name: Build Electron package
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ClawChat-windows-installer
          path: release/*Setup*.exe
      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: ClawChat-windows-portable
          path: release/*portable*.exe
      - name: Attach to Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 'Nightly Build'
          prerelease: true
          files: |
            release/*Setup*.exe
            release/*portable*.exe

  mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build server binary
        run: |
          cd server
          pip install -r requirements.txt pyinstaller
          pyinstaller run_server.py \
            --name clawchat-server \
            --onedir \
            --noconfirm \
            --hidden-import aiosqlite \
            --hidden-import sqlalchemy.dialects.sqlite \
            --collect-submodules uvicorn \
            --collect-submodules jose \
            --paths .
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:electron
      - name: Build Electron package
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Remove quarantine for ad-hoc builds
        run: |
          for f in release/*.dmg; do
            xattr -cr "$f" 2>/dev/null || true
          done
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClawChat-mac
          path: release/*.dmg
      - name: Attach to Nightly Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: 'Nightly Build'
          prerelease: true
          files: release/*.dmg
